<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Stack Animation</title>


<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Nanum Pen Script', cursive !important;
    background: #f5f5f5;
    text-align: center;
  }

  .container {
    width: 800px;
    margin: 50px auto;
    border: 4px solid #3bb3d9;
    padding: 30px;
    background: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .left {
    font-size: 36px;
    transform: rotate(-2deg); 
  }

  .right {
    width: 250px;
    border: 2px solid black;
  }

  .stack-item {
    border-bottom: 2px solid black;
    padding: 20px;
    font-size: 24px;
    background: white;
  }

  .stack-item:last-child {
    border-bottom: none;
  }

  button {
    margin: 5px;
    padding: 10px 20px;
    font-size: 18px;
    font-family: 'Nanum Pen Script', cursive;
  }
</style>
</head>

<body>

<h2>Stack Animation</h2>

<div class="container">
  
 
  <div class="left" id="codeText">
    stack.push("")
  </div>

  
  <div class="right" id="stackBox"></div>

</div>

<button onclick="pushItem()">push</button>
<button onclick="popItem()">pop</button>
<button onclick="topItem()">top</button>

<p id="topResult"></p>

<script>
let stack = [];
let maxSize = 10;

let words = [
"벚꽃","버터떡","두쫀쿠","중간고사","딸기라떼","카공",
"말차","꽃구경","아아","벚꽃","핑크색","커피","벚꽃",
"아아","두쫀쿠","버터떡","말차","개나리","벚꽃",
"두쫀쿠","케이크","공부","케이크","꽃"
];

let index = 0;

function render() {
  const stackBox = document.getElementById("stackBox");
  stackBox.innerHTML = "";

  for (let i = stack.length - 1; i >= 0; i--) {
    let div = document.createElement("div");
    div.className = "stack-item";
    div.innerText = stack[i];
    stackBox.appendChild(div);
  }
}

function pushItem() {
  if (stack.length >= maxSize) {
    alert("스택 꽉참");
    return;
  }

  if (index >= words.length) {
    alert("모든 단어 사용 완료");
    return;
  }

  let word = words[index];
  stack.push(word);
  index++;

  document.getElementById("codeText").innerText =
    'stack.push("' + word + '")';

  render();
}

function popItem() {
  if (stack.length === 0) {
    alert("비어있음");
    return;
  }

  let removed = stack.pop();

  document.getElementById("codeText").innerText =
    'stack.pop() → "' + removed + '"';

  render();
}

function topItem() {
  if (stack.length === 0) {
    document.getElementById("topResult").innerText = "비어있음";
    return;
  }

  let top = stack[stack.length - 1];

  document.getElementById("codeText").innerText =
    'stack.top() → "' + top + '"';

  document.getElementById("topResult").innerText =
    "Top: " + top;
}
</script>

</body>
</html>
